server:
  port: 8080

spring:
  application:
    name: atlas-ai

management:
  endpoints:
    web:
      exposure:
        include: health,info

atlas:
  workspace-folder: workspace
  output-folder: workspace/outputs
  prompt-folder: prompts
  developer-mode: true
  ollama:
    base-url: http://localhost:11434
    default-text-model: ""
    default-vision-model: ""
  browser:
    python-path: python3
    browser-use-entrypoint: scripts/browser_use_worker.py
    playwright-timeout: 30000
  career:
    visa-required: true
    preferred-locations:
      - Remote
      - Dallas
      - Chicago
    target-skills:
      - Java
      - Spring
      - Backend
      - Snowflake
      - Leadership
    minimum-match-score: 70
    daily-scan-cron: "0 0 8 * * *"
